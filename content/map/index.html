<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>D3 + d3-tile Boston Map</title>
  <style>
    body { margin: 0; }
    svg { display: block; width: 100vw; height: 100vh; filter: hue-rotate(45deg);}
    image { image-rendering: crisp-edges; }
  </style>
</head>
<body>

  <!-- filter: sepia(1) saturate(5) hue-rotate(290deg) brightness(1.2) -->

<div id="map"></div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/d3-tile@1"></script>
<script src="https://cdn.jsdelivr.net/npm/d3-geo@3"></script>

<script>
  const width = window.innerWidth, 
  height = 600,
  centerLat = 42.3601,
  centerLon = -71.0589,
  zoomLevel = 13;

  // Generate svg canvas
  const svg = d3.select("#map")
  .append("svg")
  .attr("viewBox", `0 0 ${width} ${height}`)
  .attr("width", width)
  .attr("height", height);

  // Base projection at default zoom level
  const projection =
      d3.geoMercator()
        .center([centerLon, centerLat])
        .scale(Math.pow(2, zoomLevel + 8) / (2 * Math.PI))
        .translate([width / 2, height / 2]);
  
  // Tile generator      
  const tile = 
      d3.tile()
        .size([width, height])
        .scale(projection.scale() * 2 * Math.PI)
        .translate(projection([0, 0]));

  function url(x,y,z) {
    return `https://tiles.stadiamaps.com/tiles/stamen_toner_lite/${z}/${x}/${y}${devicePixelRatio > 1 ? "@2x" : ""}.png`
  }

  const tiles = tile();

  // Bind tiles to image elements
  svg.selectAll("image")
    .data(tiles)
    .join("image")
    .attr("xlink:href", ([x, y, z]) => url(x, y, z))
    .attr("x", ([x]) =>
      Math.round((x + tiles.translate[0]) * tiles.scale)
    )
    .attr("y", ([, y]) =>
      Math.round((y + tiles.translate[1]) * tiles.scale)
    )
    .attr("width", tiles.scale)
    .attr("height", tiles.scale);
</script>

</body>
</html>
